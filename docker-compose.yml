services:
  postgres:
    image: postgres:16-alpine
    container_name: tjv3_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tjv3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tjv3_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      RATE_LIMIT_OFF: ${RATE_LIMIT_OFF:-false}
      TAPETIDE_ENABLED: ${TAPETIDE_ENABLED:-true}
      TAPETIDE_API_KEY: ${TAPETIDE_API_KEY:-}
      TAPETIDE_MCP_URL: ${TAPETIDE_MCP_URL:-https://mcp.tapetide.com/mcp}
      TAPETIDE_DEFAULT_EXCHANGE: ${TAPETIDE_DEFAULT_EXCHANGE:-NSE}
      ALLOW_LOCAL_AI_URLS: ${ALLOW_LOCAL_AI_URLS:-false}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - tjv3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=tjv3"
      - "traefik.http.routers.tjv3_api.rule=Host(`${DUCK_DOMAIN}`) && PathPrefix(`/api/v1`)"
      - "traefik.http.routers.tjv3_api.tls=true"
      - "traefik.http.routers.tjv3_api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tjv3_api.priority=100"
      - "traefik.http.services.tjv3_api.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: tjv3_frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tjv3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=tjv3"
      - "traefik.http.routers.tjv3_frontend.rule=Host(`${DUCK_DOMAIN}`)"
      - "traefik.http.routers.tjv3_frontend.tls=true"
      - "traefik.http.routers.tjv3_frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.tjv3_frontend.loadbalancer.server.port=3000"

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: tjv3_bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tjv3

networks:
  tjv3:
    external: true

volumes:
  postgres_data:
    driver: local
