<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeJournal — Review · Light</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600;6..72,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root {
  --bg:#f2ece4;--bg-el:#faf6f0;--bg-card:rgba(255,253,249,.92);--bg-card-h:rgba(255,253,249,.98);
  --ink:#121212;--ink-2:#252525;--ink-4:#4a4a4a;--ink-5:#6e6e6e;--ink-3:#a8a8a8;--ink-1:#c8c8c8;
  --acc:#b85c38;--acc-l:#cf7a58;--acc-m:rgba(184,92,56,.12);--acc-f:rgba(184,92,56,.06);
  --grn:#3d8b5c;--grn-m:rgba(61,139,92,.15);--grn-f:rgba(61,139,92,.07);
  --red:#b84038;--red-m:rgba(184,64,56,.15);--red-f:rgba(184,64,56,.07);
  --blu:#5b7fa5;--blu-f:rgba(91,127,165,.10);--gold:#c4a035;--gold-f:rgba(196,160,53,.10);
  --bor:rgba(0,0,0,.06);--bor-m:rgba(0,0,0,.10);--sh-1:0 1px 2px rgba(0,0,0,.03);--sh-2:0 3px 12px rgba(0,0,0,.05);
  --out:cubic-bezier(.4,0,.2,1);--spr:cubic-bezier(.34,1.56,.64,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:160px;z-index:0;}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.15)}
.app{display:flex;min-height:100vh;position:relative;z-index:1;}.main{flex:1;min-width:0;padding:2rem 2.5rem 3.5rem 3rem;max-width:calc(100vw - 232px);}
@keyframes ci{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.sidebar{width:232px;background:var(--bg-el);border-right:1px solid var(--bor);height:100vh;position:sticky;top:0;display:flex;flex-direction:column;flex-shrink:0;}
.sb-top{padding:1.375rem 1.25rem 1.125rem;border-bottom:1px solid var(--bor);}
.logo{display:flex;align-items:center;gap:.625rem;}.logo-ico{width:32px;height:32px;border-radius:8px;background:var(--acc-m);display:flex;align-items:center;justify-content:center;}.logo-ico svg{width:17px;height:17px;color:var(--acc);}.logo-n{font-family:'Newsreader',Georgia,serif;font-weight:500;font-size:1.1rem;letter-spacing:-.025rem;color:var(--ink);}
.nav{flex:1;padding:.625rem;display:flex;flex-direction:column;gap:2px;}
.nb{display:flex;align-items:center;gap:.625rem;padding:.5625rem .8125rem;border-radius:8px;font-size:.8125rem;font-weight:500;color:var(--ink-5);background:none;border:none;cursor:pointer;transition:all 120ms var(--out);text-align:left;width:100%;}
.nb svg{width:15px;height:15px;opacity:.55;transition:opacity 120ms var(--out);}.nb:hover{background:var(--acc-f);color:var(--ink-2);}.nb:hover svg{opacity:.8;}.nb.a{background:var(--acc-m);color:var(--acc);font-weight:600;}.nb.a svg{opacity:1;}
.sb-ft{padding:.875rem 1.25rem;border-top:1px solid var(--bor);display:flex;align-items:center;gap:.75rem;}
.av{width:30px;height:30px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.625rem;font-weight:700;font-family:'Newsreader',sans-serif;flex-shrink:0;}.av-n{font-size:.8125rem;font-weight:600;color:var(--ink-2);}.av-s{font-size:.625rem;color:var(--ink-3);display:flex;align-items:center;gap:.3125rem;}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.5rem;}.ptitle{font-family:'Newsreader',Georgia,serif;font-weight:400;font-size:1.75rem;letter-spacing:-.025em;line-height:1.15;color:var(--ink);}.psub{font-size:.8125rem;color:var(--ink-5);margin-top:.0625rem;}
.btn{padding:.5rem 1rem;border-radius:9px;font-size:.8125rem;font-weight:500;cursor:pointer;transition:all 120ms var(--spr);border:1px solid transparent;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:.4375rem;white-space:nowrap;}.btn svg{width:14px;height:14px;}.btn-ac{background:var(--acc);color:#fff;box-shadow:var(--sh-1);}.btn-ac:hover{background:var(--acc-l);transform:translateY(-2px);}
.btn-gh{background:transparent;color:var(--ink-4);border-color:var(--bor-m);}.btn-gh:hover{background:var(--acc-f);border-color:var(--acc);color:var(--acc);}
.progress-bar{display:flex;align-items:center;gap:.75rem;padding:1rem 1.25rem;background:var(--bg-card);border:1px solid var(--bor);border-radius:12px;margin-bottom:1.5rem;animation:ci .3s var(--out) both;}.progress-track{flex:1;height:6px;background:var(--ink-1);border-radius:3px;overflow:hidden;}.progress-fill{height:100%;background:var(--acc);border-radius:3px;transition:width .3s var(--out);}.progress-text{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--ink-3);white-space:nowrap;}
.review-card{background:var(--bg-card);border:1px solid var(--bor);border-radius:14px;overflow:hidden;animation:ci .4s var(--out) both;transition:all .2s var(--out);}
.review-card:hover{box-shadow:var(--sh-2);}
.trade-summary{padding:1.25rem 1.375rem;border-bottom:1px solid var(--bor);display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}.t-symbol{font-weight:700;font-size:1.0625rem;color:var(--ink);font-family:'JetBrains Mono',monospace;}.t-badge{font-family:'JetBrains Mono',monospace;font-size:.625rem;font-weight:600;padding:.1875rem .5rem;border-radius:5px;background:var(--grn-f);color:var(--grn);}.t-badge.r{background:var(--red-f);color:var(--red);}.t-meta{font-size:.8125rem;color:var(--ink-4);font-family:'JetBrains Mono',monospace;}.t-pnl{font-family:'JetBrains Mono',monospace;font-size:1.125rem;font-weight:600;}.t-pnl.g{color:var(--grn);}.t-pnl.r{color:var(--red);}
.review-body{padding:1.5rem 1.375rem;}.review-section{margin-bottom:1.25rem;}.r-label{font-size:.6875rem;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.625rem;}
.r-textarea{width:100%;min-height:90px;background:var(--bg-card);border:1px solid var(--bor);border-radius:10px;padding:.875rem;color:var(--ink);font-family:'Inter',sans-serif;font-size:.8125rem;line-height:1.6;resize:vertical;outline:none;transition:border-color 120ms var(--out);}.r-textarea:focus{border-color:var(--acc);}.r-textarea::placeholder{color:var(--ink-3);}
.r-tags{display:flex;flex-wrap:wrap;gap:.375rem;}.r-tag{padding:.3125rem .625rem;border-radius:6px;font-size:.6875rem;font-weight:500;border:1px solid var(--bor);color:var(--ink-4);cursor:pointer;transition:all 100ms var(--out);background:var(--bg-card);}.r-tag.active,.r-tag:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-f);}
.mood-row{display:flex;gap:.5rem;}.mood-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--bor);background:var(--bg-card);font-size:1.25rem;cursor:pointer;transition:all 100ms var(--out);display:flex;align-items:center;justify-content:center;}.mood-btn:hover,.mood-btn.active{border-color:var(--acc);background:var(--acc-f);transform:scale(1.15);}
.review-footer{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.375rem;border-top:1px solid var(--bor);background:rgba(0,0,0,.02);}
.skip-btn{background:none;border:1px solid var(--bor);color:var(--ink-4);padding:.4375rem .875rem;border-radius:8px;font-size:.75rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all 100ms var(--out);}.skip-btn:hover{color:var(--ink);border-color:var(--ink-3);}
.submit-btn{padding:.5rem 1.25rem;border-radius:8px;border:none;background:var(--acc);color:#fff;font-size:.8125rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 120ms var(--spr);box-shadow:var(--sh-1);}.submit-btn:hover{background:var(--acc-l);transform:translateY(-1px);box-shadow:var(--sh-2);}
.card-nav{display:flex;align-items:center;justify-content:center;gap:1rem;margin-top:1.5rem;}.nav-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--bor);background:var(--bg-card);color:var(--ink-4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 100ms var(--out);}.nav-btn:hover:not(:disabled){background:var(--acc-f);color:var(--acc);border-color:var(--acc);}.nav-btn:disabled{opacity:.3;cursor:default;}.card-dots{display:flex;gap:.375rem;}.card-dot{width:8px;height:8px;border-radius:50%;background:var(--ink-1);transition:all 100ms var(--out);}.card-dot.active{background:var(--acc);box-shadow:0 0 8px rgba(184,92,56,.3);}
@media(max-width:900px){.sidebar{display:none;}.main{padding:1.25rem !important;}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="sb-top"><div class="logo"><div class="logo-ico"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg></div><span class="logo-n">TradeJournal</span></div></div>
  <nav class="nav">
    <button class="nb"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>Dashboard</button>
    <button class="nb"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>Trades</button>
    <button class="nb"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>Journal</button>
    <button class="nb"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Playbook</button>
    <button class="nb a"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/><path stroke-linecap="round" stroke-linejoin="round" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"/></svg>Review</button>
    <button class="nb"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>Ideas</button>
    <button class="nb"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Settings</button>
  </nav>
  <div class="sb-ft"><div class="av">RC</div><div><div class="av-n">Ryu Chan</div><div class="av-s">Market closed</div></div></div>
</aside>
<main class="main">
  <div class="topbar">
    <div><div class="ptitle">Review</div><div class="psub">5 trades awaiting review — reflect before they're finalized</div></div>
  </div>

  <div class="progress-bar">
    <span class="progress-text">2 of 5 reviewed</span>
    <div class="progress-track"><div class="progress-fill" style="width:40%"></div></div>
    <span class="progress-text">40%</span>
  </div>

  <div class="review-card" style="animation-delay:150ms;">
    <div class="trade-summary">
      <span class="t-symbol">RELIANCE</span>
      <span class="t-badge">LONG</span>
      <span class="t-pnl g">+₹3,225</span>
      <span class="t-meta">13 May · Breakout · Target hit</span>
    </div>
    <div class="review-body">
      <div class="review-section">
        <div class="r-label">How did you feel?</div>
        <div class="mood-row">
          <button class="mood-btn" title="Confident">😤</button><button class="mood-btn active" title="Relieved">😊</button><button class="mood-btn" title="Neutral">😐</button><button class="mood-btn" title="Anxious">😟</button><button class="mood-btn" title="Frustrated">😡</button>
        </div>
      </div>
      <div class="review-section">
        <div class="r-label">What did you learn?</div>
        <textarea class="r-textarea" placeholder="What went right or wrong on this trade?">Clean breakout above 2840. Entered on confirmation, not before. This is how I should execute every breakout — wait for the close above resistance.</textarea>
      </div>
      <div class="review-section">
        <div class="r-label">Tags</div>
        <div class="r-tags">
          <span class="r-tag active">Followed Plan</span><span class="r-tag active">Patience</span><span class="r-tag">FOMO</span><span class="r-tag">Oversized</span><span class="r-tag">Perfect Entry</span><span class="r-tag">Early Exit</span>
        </div>
      </div>
    </div>
    <div class="review-footer">
      <button class="skip-btn">Skip for now</button>
      <button class="submit-btn">Complete Review</button>
    </div>
  </div>

  <div class="card-nav">
    <button class="nav-btn" onclick="prevTrade()"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></button>
    <div class="card-dots">
      <div class="card-dot"></div><div class="card-dot"></div><div class="card-dot active"></div><div class="card-dot"></div><div class="card-dot"></div>
    </div>
    <button class="nav-btn" onclick="nextTrade()"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></button>
  </div>
</main>
</div>
<script>
let current=2;
function update(){document.querySelectorAll('.card-dot').forEach((d,i)=>{d.classList.toggle('active',i===current);});}
function prevTrade(){if(current>0){current--;update();}}
function nextTrade(){if(current<4){current++;update();}}
document.querySelectorAll('.mood-btn').forEach(b=>b.addEventListener('click',function(){this.parentElement.querySelectorAll('.mood-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');}));
document.querySelectorAll('.r-tag').forEach(t=>t.addEventListener('click',function(){this.classList.toggle('active');}));
</script>
</body>
</html>
